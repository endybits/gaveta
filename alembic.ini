# Alembic configuration — a DEVELOPER CONVENIENCE ONLY.
#
# Nothing under src/ reads this file. It exists so that, in a checkout, you can run:
#
#     GAVETA_HOME=$(mktemp -d) uv run alembic revision --autogenerate -m "..."
#     GAVETA_HOME=$(mktemp -d) uv run alembic upgrade head
#
# Gaveta itself builds its Alembic config programmatically in gaveta/db/config.py,
# resolving script_location from the installed package rather than from this file.
# That is what lets `pipx install gaveta-cli` create its own database: the repo root
# does not ship in the wheel, but src/gaveta/db/migrations/ does.
#
# See docs/adr/ADR-002-persistence-and-time.md.

[alembic]
# The migrations live inside the package, not beside this file.
script_location = %(here)s/src/gaveta/db/migrations

prepend_sys_path = .
path_separator = os

# DELIBERATELY EMPTY. env.py sets the URL from GAVETA_HOME on every run, so an alembic
# command cannot migrate a drawer the user did not name. A URL here would be a URL that
# follows your shell's working directory.
sqlalchemy.url =


[post_write_hooks]
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
